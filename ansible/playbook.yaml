---
- hosts: web
  become: yes
  vars:
    app_dir: /app/final-devops-ex1
    mysql_database: B-CHANTHA_Mengkong-db
    mysql_user: root
    mysql_password: Hello@123
    remote_backup_file: "{{ app_dir }}/backup.sql"
    local_backup_file: "{{ playbook_dir }}/../backup.sql"

  tasks:

    - name: Check application directory exists
      stat:
        path: "{{ app_dir }}/.git"
      register: app_git_dir

    - name: Stop if application directory is wrong
      fail:
        msg: "Repository not found at {{ app_dir }}. Update app_dir in ansible/playbook.yaml to the real path on the web server."
      when: not app_git_dir.stat.exists

    - name: Show current git state before cleanup
      command: git status --short
      args:
        chdir: "{{ app_dir }}"
      register: git_status_before
      changed_when: false

    - name: Print git state before cleanup
      debug:
        var: git_status_before.stdout_lines

    - name: Remove local changes before pulling
      shell: |
        git reset --hard HEAD
        git clean -fd
      args:
        chdir: "{{ app_dir }}"

    - name: Pull latest code
      command: git pull --ff-only
      args:
        chdir: "{{ app_dir }}"

    - name: Build project with Gradle
      shell: |
        export JAVA_HOME=/opt/java/openjdk
        export PATH=$JAVA_HOME/bin:$PATH
        ./gradlew clean assemble
      args:
        chdir: "{{ app_dir }}"

    - name: Run tests with SQLite test database
      shell: |
        export JAVA_HOME=/opt/java/openjdk
        export PATH=$JAVA_HOME/bin:$PATH
        ./gradlew test --tests '*' -Dspring.profiles.active=test
      args:
        chdir: "{{ app_dir }}"
      environment:
        SPRING_PROFILES_ACTIVE: test
        SPRING_DATASOURCE_URL: jdbc:sqlite:test.db
        SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.sqlite.JDBC
      register: sqlite_test_output

    - name: Print SQLite test output
      debug:
        var: sqlite_test_output.stdout_lines

    - name: Check mysqldump is installed
      command: which mysqldump
      register: mysqldump_check
      changed_when: false
      failed_when: false

    - name: Install MySQL client for database backup
      apt:
        name: default-mysql-client
        state: present
        update_cache: yes
      when: mysqldump_check.rc != 0

    - name: Backup production MySQL database
      shell: |
        mysqldump \
          -h127.0.0.1 \
          -u{{ mysql_user }} \
          -p"{{ mysql_password }}" \
          "{{ mysql_database }}" \
          > {{ remote_backup_file }}

    - name: Verify backup.sql was created
      command: ls -lh "{{ remote_backup_file }}"
      register: backup_file_info
      changed_when: false

    - name: Print backup.sql file info
      debug:
        var: backup_file_info.stdout

    - name: Download backup.sql from web server
      fetch:
        src: "{{ remote_backup_file }}"
        dest: "{{ local_backup_file }}"
        flat: yes
