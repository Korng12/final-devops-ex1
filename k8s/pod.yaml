apiVersion: v1
kind: Pod

metadata:
  name: final-exam-pod
  labels:
    app: final-exam

spec:
  containers:

  - name: mysql
    image: mysql:8

    env:
      - name: MYSQL_ROOT_PASSWORD
        value: "Hello@123"

      - name: MYSQL_DATABASE
        value: "B-CHANTHA_Mengkong-db"

    ports:
      - containerPort: 3306

  - name: web
    image: id-card-system:latest
    imagePullPolicy: Never

    env:
      - name: SPRING_DATASOURCE_URL
        value: jdbc:mysql://localhost:3306/B-CHANTHA_Mengkong-db

      - name: SPRING_DATASOURCE_USERNAME
        value: root

      - name: SPRING_DATASOURCE_PASSWORD
        value: Hello@123

    ports:
      - containerPort: 8080
      - containerPort: 22