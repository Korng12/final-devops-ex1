---
- hosts: web
  become: no

  vars:
    app_dir: /app/final-devops-ex1

  tasks:

    - name: Show current git state
      shell: git status --short
      args:
        chdir: "{{ app_dir }}"

    - name: Pull latest code
      shell: git pull --ff-only
      args:
        chdir: "{{ app_dir }}"

    - name: Verify Java installation
      shell: |
        export JAVA_HOME=/opt/java/openjdk
        export PATH=$JAVA_HOME/bin:$PATH
        java -version
      register: java_output

    - name: Show Java version
      debug:
        var: java_output.stderr_lines

    - name: Build project
      shell: |
        export JAVA_HOME=/opt/java/openjdk
        export PATH=$JAVA_HOME/bin:$PATH
        ./gradlew clean build
      args:
        chdir: "{{ app_dir }}"
      register: build_output

    - name: Show build output
      debug:
        var: build_output.stdout_lines

    - name: Run SQLite tests
      shell: |
        export JAVA_HOME=/opt/java/openjdk
        export PATH=$JAVA_HOME/bin:$PATH
        ./gradlew test
      args:
        chdir: "{{ app_dir }}"
      environment:
        SPRING_PROFILES_ACTIVE: test
        SPRING_DATASOURCE_URL: jdbc:sqlite:test.db
        SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.sqlite.JDBC
      register: test_output

    - name: Show test output
      debug:
        var: test_output.stdout_lines

    - name: Backup MySQL database
      shell: |
        mysqldump \
          -h127.0.0.1 \
          -uroot \
          -pHello@123 \
          B-CHANTHA_Mengkong-db \
          > /app/backup.sql

    - name: Verify backup file
      shell: ls -lh /app/backup.sql
      register: backup_info

    - name: Show backup file info
      debug:
        var: backup_info.stdout