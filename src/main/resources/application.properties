spring.application.name=id-card-system
server.port=9090
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3309/idcard_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kong}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123321}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

idcard.photo.storage-dir=${IDCARD_PHOTO_STORAGE_DIR:uploads/photos}
idcard.photo.max-size-bytes=${IDCARD_PHOTO_MAX_SIZE_BYTES:2097152}
idcard.verification-base-url=${IDCARD_VERIFICATION_BASE_URL:http://localhost:9090/api/profiles/verify}
