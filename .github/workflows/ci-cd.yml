name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:sqlite:test.db
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.sqlite.JDBC

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Run SQLite tests
        run: ./gradlew clean test --tests '*' -Dspring.profiles.active=test

      - name: Build application
        run: ./gradlew clean assemble

      - name: Install Ansible
        if: success() && github.ref == 'refs/heads/main'
        run: python -m pip install --user ansible

      - name: Configure SSH key
        if: success() && github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add web server to known hosts
        if: success() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SERVER_PORT || '22' }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Create Ansible inventory
        if: success() && github.ref == 'refs/heads/main'
        run: |
          cat > ansible/github-inventory.ini <<EOF
          [web]
          webserver ansible_host=${{ secrets.SERVER_HOST }}

          [web:vars]
          ansible_port=${{ secrets.SERVER_PORT || '22' }}
          ansible_user=${{ secrets.SERVER_USER }}
          ansible_ssh_common_args='-o StrictHostKeyChecking=yes'
          EOF

      - name: Deploy to web server with Ansible
        if: success() && github.ref == 'refs/heads/main'
        run: ansible-playbook -i ansible/github-inventory.ini ansible/playbook.yaml

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "GitHub Actions failed: ${{ github.repository }} #${{ github.run_number }}"
          to: srengty@gmail.com
          cc: ${{ github.event.head_commit.author.email }}
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Build, test, or deploy failed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Developer: ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>
            Workflow: ${{ github.workflow }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
